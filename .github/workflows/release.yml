name: release

# Build standalone binaries on every version tag and attach them to the
# GitHub Release. Asset names must match what install.sh + self-update parse.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon.
          - os: macos-14
            target: macos-arm64
            asset: omoikane-macos-arm64.tar.gz
          # Oldest practical glibc — ubuntu-latest links a newer glibc that
          # fails with "GLIBC_2.xx not found" on older distros.
          - os: ubuntu-22.04
            target: linux-x86_64
            asset: omoikane-linux-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (non-editable) + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install ".[runtime,tui,transport]" pyinstaller

      - name: Build onedir binary
        run: pyinstaller --clean --noconfirm omoikane.spec

      - name: Smoke test + version/tag gate
        shell: bash
        run: |
          BIN=dist/omoikane/omoikane
          "$BIN" --version
          "$BIN" list
          "$BIN" --self-test          # proves bundled hermes SDK loads (per-OS)
          VER="$("$BIN" --version | awk '{print $2}')"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VER" != "$TAG" ]; then
            echo "version mismatch: binary=$VER tag=$TAG (bump omoikane/_version.py)"
            exit 1
          fi

      - name: Package tarball + checksum
        shell: bash
        run: |
          tar -czf "${{ matrix.asset }}" -C dist omoikane
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          # Treat the whole 0.x series (and any rc/beta/alpha tag) as a
          # prerelease; flip automatically once a v1.x tag is cut.
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
